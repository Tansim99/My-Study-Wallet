name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Initialize Buildozer
      run: |
        ~/.local/bin/buildozer init
        # Modify buildozer.spec to bundle HTML
        sed -i 's/title = My Application/title = Study Nexus/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = studynexus/g' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = html,css,js,png,jpg/g' buildozer.spec
        sed -i 's/#requirements = python3,kivy/requirements = python3,kivy,android/g' buildozer.spec
        sed -i 's/#p4a.html_bootstrap = False/p4a.html_bootstrap = True/g' buildozer.spec

    - name: Build with Buildozer
      run: ~/.local/bin/buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Wallet of Tansim
        path: bin/*.apk
